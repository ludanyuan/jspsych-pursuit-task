<!DOCTYPE html>
<html>
<head>
  <title>Continuous Pursuit Task</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/extension-mouse-tracking@1.0.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <style>
    canvas { display: block; margin: 20px auto; border: 2px solid #ccc;
             border-radius: 4px; background: #f8f9fa; cursor: crosshair; }
    #pursuit-complete { font-family: monospace; padding: 32px; max-width: 700px; margin: auto; }
    #pursuit-complete pre { background: #f4f4f4; padding: 12px; border-radius: 4px;
                            white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body></body>
<script>
  const SPEED    = 160;   // px/s
  const RADIUS   = 28;
  const TRIAL_MS = 12000;
  const W = 640, H = 400;

  // Module-scope (NOT window.*) — on_load writes, on_finish reads via shared closure.
  // Keeping these off window prevents a DOM-inspection bot from reading the live
  // circle position via page.evaluate() mid-trial, which would defeat both signals.
  let _targetPath = [];
  let _canvasRect = null;
  let _pursuitAnimId = null;

  const jsPsych = initJsPsych({
    extensions: [{ type: jsPsychExtensionMouseTracking, params: { minimum_sample_time: 0 } }]
  });

  var instructions = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus:
      '<div style="max-width:560px; margin:auto; font-size:18px; line-height:1.7;">' +
      '<h2 style="margin-top:0;">Continuous Pursuit Task</h2>' +
      '<p>A circle will move around the screen continuously for 12 seconds.</p>' +
      '<p>Move your mouse to follow the circle as closely as possible throughout ' +
      'the entire trial. Try to keep your cursor on the circle at all times.</p>' +
      '<p style="margin-top:24px;">Press any key to begin.</p>' +
      '</div>',
    choices: 'ALL_KEYS'
  };

  var trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<canvas id="pursuit-canvas" width="' + W + '" height="' + H + '"></canvas>' +
              '<p style="text-align:center; color:#888; font-size:14px; margin-top:4px;">' +
              'Follow the circle with your mouse</p>',
    choices: 'NO_KEYS',
    trial_duration: TRIAL_MS,
    extensions: [{ type: jsPsychExtensionMouseTracking, params: { minimum_sample_time: 0 } }],

    on_load: function () {
      const canvas = document.getElementById('pursuit-canvas');
      const ctx    = canvas.getContext('2d');

      // Record canvas position in viewport once (stable for trial duration).
      _canvasRect = canvas.getBoundingClientRect();

      // Circle physics — random initial position and direction.
      let cx = W / 2 + (Math.random() - 0.5) * 200;
      let cy = H / 2 + (Math.random() - 0.5) * 150;
      const angle = Math.random() * Math.PI * 2;
      let vx = Math.cos(angle) * SPEED;
      let vy = Math.sin(angle) * SPEED;

      _targetPath = [];
      const trialStart = performance.now();
      let lastTime = null;

      function animate(now) {
        const dt = lastTime ? (now - lastTime) / 1000 : 0;
        lastTime = now;

        // Move
        cx += vx * dt;
        cy += vy * dt;

        // Bounce off walls
        if (cx - RADIUS < 0)  { cx = RADIUS;     vx =  Math.abs(vx); }
        if (cx + RADIUS > W)  { cx = W - RADIUS; vx = -Math.abs(vx); }
        if (cy - RADIUS < 0)  { cy = RADIUS;     vy =  Math.abs(vy); }
        if (cy + RADIUS > H)  { cy = H - RADIUS; vy = -Math.abs(vy); }

        // Shadow-record ground-truth target position for post-hoc scoring.
        _targetPath.push({ t: Math.round(now - trialStart), cx, cy });

        // Draw
        ctx.clearRect(0, 0, W, H);
        ctx.beginPath();
        ctx.arc(cx, cy, RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#868e96';
        ctx.fill();
        ctx.strokeStyle = '#495057';
        ctx.lineWidth = 2;
        ctx.stroke();

        _pursuitAnimId = requestAnimationFrame(animate);
      }

      _pursuitAnimId = requestAnimationFrame(animate);
    },

    on_finish: function (data) {
      // Stop animation
      if (_pursuitAnimId) {
        cancelAnimationFrame(_pursuitAnimId);
        _pursuitAnimId = null;
      }

      const moves  = (data.mouse_tracking_data || []).filter(e => e.event === 'mousemove');
      const path   = _targetPath || [];
      const rect   = _canvasRect || { left: 0, top: 0 };

      // --- distance scoring ---
      // For each mousemove event, interpolate target canvas position at that t
      // and compute pixel distance to cursor (converted to canvas space).
      const distances = [];
      for (const mv of moves) {
        const t = mv.t;

        // Binary-search for surrounding path entries
        let lo = 0, hi = path.length - 1;
        while (lo < hi - 1) {
          const mid = (lo + hi) >> 1;
          if (path[mid].t <= t) lo = mid; else hi = mid;
        }
        const before = path[lo], after = path[hi];
        let tcx, tcy;
        if (!before) { tcx = after.cx; tcy = after.cy; }
        else if (!after || before.t === after.t) { tcx = before.cx; tcy = before.cy; }
        else {
          const f = (t - before.t) / (after.t - before.t);
          tcx = before.cx + f * (after.cx - before.cx);
          tcy = before.cy + f * (after.cy - before.cy);
        }

        // Convert viewport cursor coords to canvas-local coords
        const curX = mv.x - rect.left;
        const curY = mv.y - rect.top;
        distances.push(Math.sqrt((curX - tcx) ** 2 + (curY - tcy) ** 2));
      }

      // --- inter-event gap analysis ---
      const timestamps = moves.map(m => m.t);
      const gaps = [];
      for (let i = 1; i < timestamps.length; i++) {
        gaps.push(timestamps[i] - timestamps[i - 1]);
      }

      const shortGaps = gaps.filter(g => g < 100);   // within-burst (rAF cadence)
      const longGaps  = gaps.filter(g => g >= 100);  // inter-turn dead time

      const mean = arr => arr.length ? arr.reduce((s, v) => s + v, 0) / arr.length : null;
      const pct  = (arr, p) => arr.length ? arr.sort((a,b)=>a-b)[Math.floor(arr.length * p)] : null;

      data.n_events         = moves.length;
      data.mean_distance    = distances.length ? mean(distances) : null;
      data.p90_distance     = distances.length ? pct([...distances], 0.9) : null;
      data.n_short_gaps     = shortGaps.length;
      data.n_long_gaps      = longGaps.length;
      data.gap_mean_short   = mean(shortGaps);
      data.gap_mean_long    = mean(longGaps);
      data.gap_sd_long      = longGaps.length > 1
        ? Math.sqrt(longGaps.map(g => (g - mean(longGaps)) ** 2).reduce((s,v)=>s+v,0) / longGaps.length)
        : null;
      data.raw_gaps         = gaps;                  // keep full gap list for analysis
    }
  };

  // Verdict layer — grounded in n=4 human, n=4 bot (seeds 1–4, claude-haiku-4-5).
  // Humans: Yumi mean=20.0px gap_mean_long=220ms; Aiden mean=20.3px gap_mean_long=267ms;
  //         P3   mean=55.6px gap_mean_long=192ms; P4 mean=17.9px gap_mean_long=231ms.
  // Bot s1: mean=282.9px gap_mean_long=2110ms; s2: 336.9px / 1760ms;
  //     s3: 255.3px / 1484ms; s4: 350.6px / 1045ms. All seeds: both flags = true.
  //
  // Gap signal uses gap_mean_long (mean of gaps ≥100ms), NOT max_long.
  // max_long produced a false positive on P3 (one gap at ~575ms among 24 long gaps).
  // gap_mean_long is structurally grounded: bot pauses are API round-trips (≥500ms each),
  // so its mean stays >> 800ms; occasional human lapses lift max but not mean.
  // Human ceiling: 267ms. Bot range: 1045–2110ms. Threshold 800ms has 778ms margin.
  function computeVerdict(d) {
    const GAP_MEAN_LONG_MS = 800;  // human max observed: 267ms (n=4); bot range: 1045–2110ms
    const MEAN_DIST_PX     = 100;  // human: 17.9–55.6px (n=4); bot range: 255–351px

    const rawGaps  = d.raw_gaps || [];
    const maxGap   = rawGaps.length ? Math.max(...rawGaps) : 0;
    const nTotal   = rawGaps.length;
    const nLong    = d.n_long_gaps || 0;

    const distFlag = (d.mean_distance   || 0) > MEAN_DIST_PX;
    const gapFlag  = (d.gap_mean_long   || 0) > GAP_MEAN_LONG_MS;

    return {
      bot_suspected: distFlag || gapFlag,
      method: 'continuous-pursuit',
      signals: {
        mean_distance_px:    d.mean_distance  != null ? +d.mean_distance.toFixed(1)  : null,
        p90_distance_px:     d.p90_distance   != null ? +d.p90_distance.toFixed(1)   : null,
        n_long_gaps:         nLong,
        max_long_gap_ms:     maxGap,
        gap_mean_long_ms:    d.gap_mean_long  != null ? +d.gap_mean_long.toFixed(1)  : null,
        long_gap_proportion: nTotal > 0 ? +(nLong / nTotal).toFixed(4) : null
      },
      flags: {
        distance_suspicious: distFlag,
        gap_suspicious:      gapFlag
      },
      thresholds_used:  { gap_mean_long_ms: GAP_MEAN_LONG_MS, mean_distance_px: MEAN_DIST_PX },
      n_human_baseline: 4,
      n_bot_baseline:   4
    };
  }

  var results = {
    type: jsPsychHtmlKeyboardResponse,
    // No trial_duration — waits indefinitely so #pursuit-complete persists for data extraction.
    stimulus: '<div id="pursuit-complete"></div><pre id="data" style="display:none"></pre>',
    choices: 'NO_KEYS',
    on_load: function () {
      const trialData = jsPsych.data.get().filter({ trial_type: 'html-keyboard-response' })
        .values().find(d => d.n_events !== undefined);

      if (!trialData) {
        document.getElementById('pursuit-complete').innerHTML =
          '<h2>Complete</h2><p>No tracking data recorded.</p>';
        document.getElementById('data').textContent = JSON.stringify({ error: 'no tracking data' });
        return;
      }

      const d = trialData;
      const verdict = computeVerdict(d);

      const rawGapsSample = (d.raw_gaps || []).slice(0, 80);
      const gapBuckets = {};
      (d.raw_gaps || []).forEach(g => {
        const bucket = Math.floor(g / 50) * 50;
        gapBuckets[bucket] = (gapBuckets[bucket] || 0) + 1;
      });
      const bucketStr = Object.entries(gapBuckets)
        .sort((a,b) => Number(a[0]) - Number(b[0]))
        .map(([k,v]) => '  ' + String(k).padStart(5) + '–' + (Number(k)+49) + 'ms : ' +
             '█'.repeat(Math.min(v,40)) + ' (' + v + ')')
        .join('\n');

      const verdictLine = verdict.bot_suspected
        ? '⚠ BOT SUSPECTED  (distance=' + verdict.flags.distance_suspicious +
          ', gap=' + verdict.flags.gap_suspicious + ')'
        : '✓ HUMAN (clear)  (distance=' + verdict.flags.distance_suspicious +
          ', gap=' + verdict.flags.gap_suspicious + ')';

      document.getElementById('pursuit-complete').innerHTML =
        '<h2>Pursuit trial complete — results</h2>' +
        '<pre>' +
        'n_mousemove_events : ' + d.n_events + '\n' +
        'mean_distance_px   : ' + (d.mean_distance != null ? d.mean_distance.toFixed(1) : 'N/A') + '\n' +
        'p90_distance_px    : ' + (d.p90_distance  != null ? d.p90_distance.toFixed(1)  : 'N/A') + '\n' +
        '\nINTER-EVENT GAP DISTRIBUTION\n' +
        'short gaps (<100ms): n=' + d.n_short_gaps + ', mean=' +
          (d.gap_mean_short != null ? d.gap_mean_short.toFixed(1) : 'N/A') + 'ms\n' +
        'long gaps (≥100ms) : n=' + d.n_long_gaps  + ', mean=' +
          (d.gap_mean_long  != null ? d.gap_mean_long.toFixed(1)  : 'N/A') + 'ms' +
          (d.gap_sd_long    != null ? ', sd=' + d.gap_sd_long.toFixed(1) + 'ms' : '') + '\n' +
        '\nGAP HISTOGRAM (50ms buckets)\n' + bucketStr + '\n' +
        '\nFIRST 80 RAW GAPS (ms)\n' + rawGapsSample.join(', ') +
        '\n\nVERDICT\n' + verdictLine +
        '</pre>';

      // Machine-readable JSON for the bot harness and record_session capture
      const metrics = {
        n_events:       d.n_events,
        mean_distance:  d.mean_distance  != null ? +d.mean_distance.toFixed(1)  : null,
        p90_distance:   d.p90_distance   != null ? +d.p90_distance.toFixed(1)   : null,
        n_short_gaps:   d.n_short_gaps,
        n_long_gaps:    d.n_long_gaps,
        gap_mean_short: d.gap_mean_short != null ? +d.gap_mean_short.toFixed(1) : null,
        gap_mean_long:  d.gap_mean_long  != null ? +d.gap_mean_long.toFixed(1)  : null,
        gap_sd_long:    d.gap_sd_long    != null ? +d.gap_sd_long.toFixed(1)    : null,
        raw_gaps:       d.raw_gaps || [],
        verdict:        verdict
      };
      document.getElementById('data').textContent = JSON.stringify(metrics);
    }
  };

  jsPsych.run([instructions, trial, results]);
</script>
</html>
